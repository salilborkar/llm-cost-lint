name: LLM Cost Lint
description: >
  Scans Python files in a pull request for AWS Bedrock and Azure OpenAI SDK
  calls, estimates per-call and projected monthly cost using current API
  pricing, and posts a structured cost report as a PR comment. Optionally
  blocks merge when projected cost exceeds a configurable threshold.

author: salilborkar

branding:
  icon: dollar-sign
  color: yellow

inputs:
  path:
    description: >
      Directory or file to scan. Scanned recursively for .py files.
      Defaults to the repository root.
    required: false
    default: '.'

  monthly-calls:
    description: >
      Estimated number of times each detected LLM call will execute per month
      in production. Used to project monthly cost from a per-call estimate.
    required: false
    default: '30000'

  default-input-tokens:
    description: >
      Input token count assumed per call when the value cannot be statically
      inferred from source code. Override with a value representative of your
      typical prompt size.
    required: false
    default: '1000'

  default-output-tokens:
    description: >
      Output token count assumed per call when max_tokens is not explicitly
      set in the call site.
    required: false
    default: '500'

  cost-threshold:
    description: >
      Monthly cost ceiling in USD. When the projected monthly total exceeds
      this value a warning is added to the report. Set fail-on-threshold to
      true to also block the merge. Set to 0 to disable the threshold check.
    required: false
    default: '100'

  fail-on-threshold:
    description: >
      Set to 'true' to exit with code 1 when the projected monthly cost
      exceeds cost-threshold, blocking merge if this check is required by
      branch protection rules.
    required: false
    default: 'false'

  post-pr-comment:
    description: >
      Post the cost report as a comment on the pull request. Requires
      pull-requests: write permission in the calling workflow.
    required: false
    default: 'true'

outputs:
  cost-report:
    description: 'The markdown cost report generated by LLM Cost Lint.'

runs:
  using: docker
  image: 'Dockerfile'
  env:
    INPUT_PATH: ${{ inputs.path }}
    INPUT_MONTHLY_CALLS: ${{ inputs.monthly-calls }}
    INPUT_DEFAULT_INPUT_TOKENS: ${{ inputs.default-input-tokens }}
    INPUT_DEFAULT_OUTPUT_TOKENS: ${{ inputs.default-output-tokens }}
    INPUT_COST_THRESHOLD: ${{ inputs.cost-threshold }}
    INPUT_FAIL_ON_THRESHOLD: ${{ inputs.fail-on-threshold }}
    INPUT_POST_PR_COMMENT: ${{ inputs.post-pr-comment }}
